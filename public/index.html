<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calybird</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 16px;
      background: #f9f9f9;
      color: #111;
    }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      padding: 10px 24px;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    #reminder-card {
      margin-top: 28px;
      padding: 20px 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      display: none;
    }
    #reminder-card .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0 0 16px;
      color: #111;
    }
    .field {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
      min-width: 40px;
    }
    .field span {
      font-size: 1rem;
      color: #111;
    }

    #error-box {
      margin-top: 20px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #b91c1c;
      display: none;
    }

    #reminders-section {
      margin-top: 48px;
    }
    #reminders-section h2 {
      font-size: 1.1rem;
      margin: 0 0 12px;
    }
    #reminders-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .reminder-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }
    .reminder-row.completed {
      opacity: 0.5;
    }
    .reminder-info {
      flex: 1;
    }
    .reminder-title {
      font-weight: 500;
    }
    .reminder-meta {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 2px;
    }
    .reminder-row button {
      margin-top: 0;
      padding: 6px 12px;
      font-size: 0.85rem;
    }
    .btn-complete { background: #16a34a; }
    .btn-complete:hover { background: #15803d; }
    .btn-delete  { background: #dc2626; }
    .btn-delete:hover  { background: #b91c1c; }
    #reminders-empty {
      font-size: 0.9rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>Calybird</h1>

  <textarea id="message-input" placeholder="e.g. Remind me to call the dentist tomorrow at 3pm"></textarea>
  <br />
  <button id="ask-btn">Set reminder</button>

  <div id="error-box"></div>

  <div id="reminder-card">
    <p class="card-title">Reminder set</p>
    <div class="field">
      <label>Task</label>
      <span id="field-title"></span>
    </div>
    <div class="field">
      <label>Date</label>
      <span id="field-date"></span>
    </div>
    <div class="field">
      <label>Time</label>
      <span id="field-time"></span>
    </div>
  </div>

  <section id="reminders-section">
    <h2>Upcoming Reminders</h2>
    <div id="reminders-list"></div>
  </section>

  <script>
    const btn = document.getElementById("ask-btn");
    const input = document.getElementById("message-input");
    const card = document.getElementById("reminder-card");
    const errorBox = document.getElementById("error-box");
    const remindersList = document.getElementById("reminders-list");

    function formatDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).toLocaleDateString("en-GB", {
        weekday: "long", day: "numeric", month: "long", year: "numeric",
      });
    }

    function formatTime(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      const period = h < 12 ? "AM" : "PM";
      const hour = h % 12 || 12;
      return `${hour}:${String(m).padStart(2, "0")} ${period}`;
    }

    async function loadReminders() {
      const res = await fetch("/reminders");
      const reminders = await res.json();

      remindersList.innerHTML = "";

      if (reminders.length === 0) {
        remindersList.innerHTML = '<p id="reminders-empty">No reminders yet.</p>';
        return;
      }

      for (const r of reminders) {
        const row = document.createElement("div");
        row.className = "reminder-row" + (r.completed ? " completed" : "");
        row.dataset.id = r.id;

        row.innerHTML = `
          <div class="reminder-info">
            <div class="reminder-title">${r.title}</div>
            <div class="reminder-meta">${formatDate(r.date)} at ${formatTime(r.time)}</div>
          </div>
          ${!r.completed ? `<button class="btn-complete">Complete</button>` : ""}
          <button class="btn-delete">Delete</button>
        `;

        row.querySelector(".btn-complete")?.addEventListener("click", async () => {
          await fetch(`/reminders/${r.id}/complete`, { method: "PATCH" });
          loadReminders();
        });

        row.querySelector(".btn-delete").addEventListener("click", async () => {
          await fetch(`/reminders/${r.id}`, { method: "DELETE" });
          loadReminders();
        });

        remindersList.appendChild(row);
      }
    }

    btn.addEventListener("click", async () => {
      const message = input.value.trim();
      if (!message) return;

      btn.disabled = true;
      btn.textContent = "Parsing...";
      card.style.display = "none";
      errorBox.style.display = "none";

      try {
        const now = new Date();
        const localDate = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, "0"),
          String(now.getDate()).padStart(2, "0"),
        ].join("-");

        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, localDate }),
        });

        const data = await res.json();

        if (!res.ok) {
          const friendly = res.status === 422
            ? "Sorry, I couldn't understand that as a reminder. Try rephrasing — for example: \"Remind me to call Alex on Friday at 10am\"."
            : (data.error ?? "Something went wrong. Please try again.");
          throw new Error(friendly);
        }

        document.getElementById("field-title").textContent = data.title;
        document.getElementById("field-date").textContent = formatDate(data.date);
        document.getElementById("field-time").textContent = formatTime(data.time);
        card.style.display = "block";
        loadReminders();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Set reminder";
      }
    });

    // Load on page open
    loadReminders();
  </script>
</body>
</html>
