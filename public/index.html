<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calybird</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 16px;
      background: #f9f9f9;
      color: #111;
    }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      padding: 10px 24px;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #response-box {
      margin-top: 28px;
      padding: 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      min-height: 60px;
      white-space: pre-wrap;
      display: none;
    }
    #error-box {
      margin-top: 12px;
      color: #dc2626;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Calybird</h1>

  <textarea id="message-input" placeholder="Ask Claude anything..."></textarea>
  <br />
  <button id="ask-btn">Ask Claude</button>

  <div id="error-box"></div>
  <div id="response-box"></div>

  <script>
    const btn = document.getElementById("ask-btn");
    const input = document.getElementById("message-input");
    const responseBox = document.getElementById("response-box");
    const errorBox = document.getElementById("error-box");

    btn.addEventListener("click", async () => {
      const message = input.value.trim();
      if (!message) return;

      // Reset UI and show loading state
      btn.disabled = true;
      btn.textContent = "Asking...";
      responseBox.style.display = "none";
      errorBox.style.display = "none";

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error ?? "Something went wrong");
        }

        responseBox.textContent = data.reply;
        responseBox.style.display = "block";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Ask Claude";
      }
    });
  </script>
</body>
</html>
