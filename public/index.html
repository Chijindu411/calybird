<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calybird</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 16px;
      background: #f9f9f9;
      color: #111;
    }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      padding: 10px 24px;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ---- Auth view ---- */
    #auth-view { max-width: 400px; }
    .auth-panel h2 { font-size: 1.2rem; margin: 0 0 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #374151;
    }
    .form-group input {
      width: 100%;
      padding: 9px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: 2px solid #2563eb;
      border-color: transparent;
    }
    .auth-error {
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #b91c1c;
      font-size: 0.9rem;
      display: none;
    }
    .auth-notice {
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      color: #15803d;
      font-size: 0.9rem;
      display: none;
    }
    .auth-switch {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #6b7280;
    }
    .auth-switch a {
      color: #2563eb;
      text-decoration: none;
      cursor: pointer;
    }
    .auth-switch a:hover { text-decoration: underline; }

    /* ---- User bar ---- */
    #user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    #user-email { color: #374151; }
    #logout-btn {
      margin-top: 0;
      padding: 6px 14px;
      font-size: 0.85rem;
      background: #6b7280;
    }
    #logout-btn:hover { background: #4b5563; }

    /* ---- Notification banner ---- */
    #notification-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #1e40af;
    }
    #notification-banner button {
      margin-top: 0;
      padding: 6px 14px;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* ---- Reminder card ---- */
    #reminder-card {
      margin-top: 28px;
      padding: 20px 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      display: none;
    }
    #reminder-card .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0 0 16px;
      color: #111;
    }
    .field {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
      min-width: 40px;
    }
    .field span { font-size: 1rem; color: #111; }

    #error-box {
      margin-top: 20px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #b91c1c;
      display: none;
    }

    /* ---- Reminders list ---- */
    #reminders-section { margin-top: 48px; }
    #reminders-section h2 { font-size: 1.1rem; margin: 0 0 12px; }
    #reminders-list { display: flex; flex-direction: column; gap: 8px; }
    .reminder-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }
    .reminder-row.completed { opacity: 0.5; }
    .reminder-row.past-due { background: #fff7ed; border-color: #fed7aa; }
    .past-due-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #c2410c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 3px;
    }
    .reminder-info { flex: 1; }
    .reminder-title { font-weight: 500; }
    .reminder-meta { font-size: 0.85rem; color: #6b7280; margin-top: 2px; }
    .reminder-row button { margin-top: 0; padding: 6px 12px; font-size: 0.85rem; }
    .btn-complete { background: #16a34a; }
    .btn-complete:hover { background: #15803d; }
    .btn-delete { background: #dc2626; }
    .btn-delete:hover { background: #b91c1c; }
    #reminders-empty { font-size: 0.9rem; color: #9ca3af; }
  </style>
</head>
<body>
  <h1>Calybird</h1>

  <!-- Auth view: shown when logged out -->
  <div id="auth-view">

    <div id="login-panel" class="auth-panel">
      <h2>Log in</h2>
      <div class="auth-notice" id="login-notice"></div>
      <div class="auth-error" id="login-error"></div>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" />
      </div>
      <button id="login-btn">Log in</button>
      <p class="auth-switch">Don't have an account? <a id="show-signup">Sign up</a></p>
    </div>

    <div id="signup-panel" class="auth-panel" style="display:none">
      <h2>Create account</h2>
      <div class="auth-error" id="signup-error"></div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" autocomplete="new-password" />
      </div>
      <button id="signup-btn">Create account</button>
      <p class="auth-switch">Already have an account? <a id="show-login">Log in</a></p>
    </div>

  </div>

  <!-- App view: shown when logged in -->
  <div id="app-view" style="display:none">

    <div id="user-bar">
      <span id="user-email"></span>
      <button id="logout-btn">Log out</button>
    </div>

    <div id="notification-banner">
      <span>Enable notifications to be alerted when reminders come due</span>
      <button id="enable-notifications-btn">Enable</button>
    </div>

    <textarea id="message-input" placeholder="e.g. Remind me to call the dentist tomorrow at 3pm"></textarea>
    <br />
    <button id="ask-btn">Set reminder</button>

    <div id="error-box"></div>

    <div id="reminder-card">
      <p class="card-title">Reminder set</p>
      <div class="field">
        <label>Task</label>
        <span id="field-title"></span>
      </div>
      <div class="field">
        <label>Date</label>
        <span id="field-date"></span>
      </div>
      <div class="field">
        <label>Time</label>
        <span id="field-time"></span>
      </div>
    </div>

    <section id="reminders-section">
      <h2>Upcoming Reminders</h2>
      <div id="reminders-list"></div>
    </section>

  </div>

  <script>
    // ---- DOM references ----
    const authView     = document.getElementById("auth-view");
    const appView      = document.getElementById("app-view");
    const loginPanel   = document.getElementById("login-panel");
    const signupPanel  = document.getElementById("signup-panel");
    const loginError   = document.getElementById("login-error");
    const loginNotice  = document.getElementById("login-notice");
    const signupError  = document.getElementById("signup-error");
    const loginBtn     = document.getElementById("login-btn");
    const signupBtn    = document.getElementById("signup-btn");
    const askBtn       = document.getElementById("ask-btn");
    const input        = document.getElementById("message-input");
    const card         = document.getElementById("reminder-card");
    const errorBox     = document.getElementById("error-box");
    const remindersList = document.getElementById("reminders-list");
    const notificationBanner    = document.getElementById("notification-banner");
    const enableNotificationsBtn = document.getElementById("enable-notifications-btn");

    // ---- View transitions ----
    let rerenderInterval = null;

    function showAppView(email) {
      authView.style.display = "none";
      appView.style.display = "block";
      document.getElementById("user-email").textContent = email;
      loadReminders();
      checkNotificationPermission();
      rerenderInterval = setInterval(() => renderReminders(cachedReminders), 60000);
    }

    // ---- Notification permission banner ----
    function checkNotificationPermission() {
      if (!("Notification" in window)) return;
      notificationBanner.style.display = Notification.permission === "default" ? "flex" : "none";
      if (Notification.permission === "granted") subscribeToPush();
    }

    enableNotificationsBtn.addEventListener("click", async () => {
      const result = await Notification.requestPermission();
      notificationBanner.style.display = "none";
      if (result === "granted") subscribeToPush();
    });

    // ---- Push subscription ----
    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map((char) => char.charCodeAt(0)));
    }

    async function subscribeToPush() {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;

      try {
        const registration = await navigator.serviceWorker.ready;

        let subscription = await registration.pushManager.getSubscription();
        if (!subscription) {
          const keyRes = await fetch("/push/vapid-public-key", { credentials: "include" });
          const { publicKey } = await keyRes.json();

          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey),
          });
        }

        await fetch("/push/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ subscription }),
        });
      } catch (err) {
        console.error("Push subscription failed:", err);
      }
    }

    function showAuthView() {
      appView.style.display = "none";
      authView.style.display = "block";
      clearInterval(rerenderInterval);
      rerenderInterval = null;
      // Reset notification tracking so a future session starts clean —
      // otherwise a different user's reminder could share an ID already
      // marked as notified/seeded from this session.
      notifiedReminderIds.clear();
      previousPastDueIds = null;
      // Reset to login panel with clean state
      signupPanel.style.display = "none";
      loginPanel.style.display = "block";
      document.getElementById("login-email").value = "";
      document.getElementById("login-password").value = "";
      loginError.style.display = "none";
      loginNotice.style.display = "none";
    }

    // ---- Panel toggle ----
    document.getElementById("show-signup").addEventListener("click", () => {
      loginPanel.style.display = "none";
      signupPanel.style.display = "block";
      signupError.style.display = "none";
      document.getElementById("signup-email").value = "";
      document.getElementById("signup-password").value = "";
    });

    document.getElementById("show-login").addEventListener("click", () => {
      signupPanel.style.display = "none";
      loginPanel.style.display = "block";
      loginError.style.display = "none";
      loginNotice.style.display = "none";
    });

    // ---- Login ----
    loginBtn.addEventListener("click", async () => {
      const email    = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      loginError.style.display = "none";
      loginNotice.style.display = "none";

      if (!email || !password) {
        loginError.textContent = "Please enter your email and password.";
        loginError.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in…";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          loginError.textContent = data.error ?? "Login failed. Please try again.";
          loginError.style.display = "block";
          return;
        }
        showAppView(data.email);
      } catch {
        loginError.textContent = "Network error. Please try again.";
        loginError.style.display = "block";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Log in";
      }
    });

    // Submit login form on Enter key
    document.getElementById("login-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    // ---- Signup ----
    signupBtn.addEventListener("click", async () => {
      const email    = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      signupError.style.display = "none";

      if (!email || !password) {
        signupError.textContent = "Please enter your email and password.";
        signupError.style.display = "block";
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = "Creating account…";

      try {
        const res = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          signupError.textContent = data.error ?? "Signup failed. Please try again.";
          signupError.style.display = "block";
          return;
        }

        // Auto-login immediately after account creation
        const loginRes = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password }),
        });
        const loginData = await loginRes.json();
        if (loginRes.ok) {
          showAppView(loginData.email);
        } else {
          // Extremely unlikely — fall back to login form with a success notice
          signupPanel.style.display = "none";
          loginPanel.style.display = "block";
          loginNotice.textContent = "Account created! Please log in.";
          loginNotice.style.display = "block";
        }
      } catch {
        signupError.textContent = "Network error. Please try again.";
        signupError.style.display = "block";
      } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = "Create account";
      }
    });

    // Submit signup form on Enter key
    document.getElementById("signup-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") signupBtn.click();
    });

    // ---- Logout ----
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/logout", { method: "POST", credentials: "include" });
      showAuthView();
    });

    // ---- Reminder helpers ----
    function formatDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).toLocaleDateString("en-GB", {
        weekday: "long", day: "numeric", month: "long", year: "numeric",
      });
    }

    function formatTime(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      const period = h < 12 ? "AM" : "PM";
      const hour = h % 12 || 12;
      return `${hour}:${String(m).padStart(2, "0")} ${period}`;
    }

    function isPastDue(dateStr, timeStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const [h, min] = timeStr.split(":").map(Number);
      return new Date(y, m - 1, d, h, min) < new Date();
    }

    function reminderTimestamp(r) {
      const [y, m, d] = r.date.split("-").map(Number);
      const [h, min] = r.time.split(":").map(Number);
      return new Date(y, m - 1, d, h, min).getTime();
    }

    function sortGroup(r) {
      if (r.completed)               return 2;
      if (isPastDue(r.date, r.time)) return 0;
      return 1;
    }

    let cachedReminders = [];

    // ---- Past-due notifications ----
    // previousPastDueIds is null until the first render, so reminders that are
    // already past due when the page loads don't immediately fire notifications.
    let previousPastDueIds = null;
    const notifiedReminderIds = new Set();

    function checkPastDueNotifications(reminders) {
      const currentPastDueIds = new Set(
        reminders.filter((r) => !r.completed && isPastDue(r.date, r.time)).map((r) => r.id)
      );

      if (previousPastDueIds !== null && Notification.permission === "granted") {
        for (const r of reminders) {
          const justBecamePastDue = currentPastDueIds.has(r.id) && !previousPastDueIds.has(r.id);
          if (justBecamePastDue && !notifiedReminderIds.has(r.id)) {
            notifiedReminderIds.add(r.id);
            sendPastDueNotification(r);
          }
        }
      }

      previousPastDueIds = currentPastDueIds;
    }

    function sendPastDueNotification(reminder) {
      const notification = new Notification("Calybird reminder", {
        body: reminder.title,
      });
      notification.addEventListener("click", () => {
        window.focus();
        notification.close();
      });
    }

    function renderReminders(reminders) {
      checkPastDueNotifications(reminders);

      const sorted = [...reminders].sort((a, b) => {
        const groupDiff = sortGroup(a) - sortGroup(b);
        if (groupDiff !== 0) return groupDiff;
        return reminderTimestamp(a) - reminderTimestamp(b);
      });

      remindersList.innerHTML = "";

      if (sorted.length === 0) {
        remindersList.innerHTML = '<p id="reminders-empty">No reminders yet.</p>';
        return;
      }

      for (const r of sorted) {
        const row = document.createElement("div");
        const pastDue = !r.completed && isPastDue(r.date, r.time);
        row.className = "reminder-row" +
          (r.completed ? " completed" : "") +
          (pastDue     ? " past-due"  : "");
        row.dataset.id = r.id;

        row.innerHTML = `
          <div class="reminder-info">
            <div class="reminder-title">${r.title}</div>
            <div class="reminder-meta">${formatDate(r.date)} at ${formatTime(r.time)}</div>
            ${pastDue ? `<div class="past-due-label">Past due</div>` : ""}
          </div>
          ${!r.completed ? `<button class="btn-complete">Complete</button>` : ""}
          <button class="btn-delete">Delete</button>
        `;

        row.querySelector(".btn-complete")?.addEventListener("click", async () => {
          await fetch(`/reminders/${r.id}/complete`, {
            method: "PATCH",
            credentials: "include",
          });
          loadReminders();
        });

        row.querySelector(".btn-delete").addEventListener("click", async () => {
          await fetch(`/reminders/${r.id}`, {
            method: "DELETE",
            credentials: "include",
          });
          loadReminders();
        });

        remindersList.appendChild(row);
      }
    }

    async function loadReminders() {
      const res = await fetch("/reminders", { credentials: "include" });
      cachedReminders = await res.json();
      renderReminders(cachedReminders);
    }

    // ---- Ask button ----
    askBtn.addEventListener("click", async () => {
      const message = input.value.trim();
      if (!message) return;

      askBtn.disabled = true;
      askBtn.textContent = "Parsing…";
      card.style.display = "none";
      errorBox.style.display = "none";

      try {
        const now = new Date();
        const localDate = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, "0"),
          String(now.getDate()).padStart(2, "0"),
        ].join("-");

        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ message, localDate }),
        });

        const data = await res.json();

        if (!res.ok) {
          const friendly = res.status === 422
            ? "Sorry, I couldn't understand that as a reminder. Try rephrasing — for example: \"Remind me to call Alex on Friday at 10am\"."
            : (data.error ?? "Something went wrong. Please try again.");
          throw new Error(friendly);
        }

        document.getElementById("field-title").textContent = data.title;
        document.getElementById("field-date").textContent  = formatDate(data.date);
        document.getElementById("field-time").textContent  = formatTime(data.time);
        card.style.display = "block";
        input.value = "";

        // A reminder created with a date/time already in the past shouldn't
        // notify immediately — the user just typed it, they already know.
        if (isPastDue(data.date, data.time)) {
          notifiedReminderIds.add(data.id);
        }

        loadReminders();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = "Set reminder";
      }
    });

    // ---- Register service worker (needed for push notifications) ----
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.error("Service worker registration failed:", err);
      });
    }

    // ---- Boot: restore session if one already exists ----
    (async () => {
      try {
        const res = await fetch("/me", { credentials: "include" });
        if (res.ok) {
          const user = await res.json();
          showAppView(user.email);
        }
        // 401 → auth-view is already visible by default
      } catch {
        // Network error — stay on auth-view
      }
    })();

    window.addEventListener("pagehide", () => clearInterval(rerenderInterval));
  </script>
</body>
</html>
